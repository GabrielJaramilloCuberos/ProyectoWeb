<!--  Este es el div principal de la aplicacion -->
<div class="min-h-screen relative bg-linear-to-br from-slate-50 via-blue-50 to-cyan-50">
  <div class="h-screen flex items-center justify-center px-4 sm:px-6">
    <div class="w-full max-w-md animate-fade-in">
      <!-- Glass login card -->
      <app-glass-card>

        <!-- Logo/Icon -->
        <div class="text-center mb-8 sm:mb-10 animate-fade-in" style="animation-delay: 0.2s;">
          <div
            class="mx-auto w-16 h-16 sm:w-20 sm:h-20 bg-linear-to-br from-blue-500 to-cyan-400 rounded-2xl sm:rounded-3xl flex items-center justify-center mb-4 sm:mb-6 shadow-xl shadow-blue-500/25 transition-all duration-300 hover:scale-110 active:scale-95">
            <!-- Shield Icon SVG -->
            <svg class="w-8 h-8 sm:w-10 sm:h-10 text-white transition-transform duration-300 hover:rotate-6"
              fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
            </svg>
          </div>
          <h1
            class="text-3xl sm:text-4xl font-semibold text-gray-900 mb-2 sm:mb-3 tracking-tight transition-all duration-500">
            Bienvenido
          </h1>
          <p class="text-base sm:text-lg text-gray-500 transition-all duration-500">
            Sistema de Vigilancia Docente
          </p>
        </div>

        <!-- Login Form -->
        <form class="space-y-4 sm:space-y-5">
          
          <app-mail [(email)]="email" delay="0.3s">
          </app-mail>

          <app-password [(password)]="password" delay="0.4s" class = "block py-3"></app-password>

          <!-- Remember Me Checkbox -->
          <div class="flex items-center justify-center gap-2.5 pt-2 animate-fade-in" style="animation-delay: 0.5s;">
            <div class="relative">
              <input id="remember" type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" class="sr-only peer" />
              <label for="remember" class="flex items-center justify-center w-6 h-6 rounded-lg border-2 border-gray-300 bg-white/50 cursor-pointer transition-all duration-300 ease-out
                    peer-checked:bg-linear-to-br peer-checked:from-blue-500 peer-checked:to-cyan-400 peer-checked:border-blue-500 peer-checked:scale-110
                    hover:border-blue-300 hover:shadow-lg hover:shadow-blue-200/50 hover:scale-105
                    peer-focus:ring-2 peer-focus:ring-blue-400 peer-focus:ring-offset-2">
                <svg class="w-4 h-4 text-white transition-all duration-300" [class.scale-100]="rememberMe"
                  [class.opacity-100]="rememberMe" [class.scale-0]="!rememberMe" [class.opacity-0]="!rememberMe"
                  fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewBox="0 0 24 24"
                  stroke="currentColor">
                  <path d="M5 13l4 4L19 7"></path>
                </svg>
              </label>
            </div>
            <label for="remember"
              class="text-sm font-medium text-gray-700 cursor-pointer select-none transition-all duration-300 hover:text-blue-600">
              Recordar contraseña
            </label>
          </div>

          <!-- Submit Button -->
          <button type="button"
            class="w-full mt-6 sm:mt-8 py-3 sm:py-3.5 bg-linear-to-r from-blue-500 to-cyan-400 hover:from-blue-600 hover:to-cyan-500 text-white font-medium rounded-xl transition-all duration-300 shadow-xl shadow-blue-500/25 hover:shadow-2xl hover:shadow-blue-500/35 active:scale-95 active:shadow-lg hover:scale-105 animate-fade-in"
            style="animation-delay: 0.6s;">
            Iniciar Sesión
          </button>
        </form>


      </app-glass-card>
    </div>
  </div>
</div>
