<main class="relative grid min-h-dvh place-items-center overflow-hidden bg-linear-to-br from-blue-50 via-purple-50 to-pink-50 px-4 py-8 font-[Segoe_UI,sans-serif]">
  <!-- Gradient blob decorativo fondo izquierda -->
  <div class="pointer-events-none absolute -left-24 top-1/4 h-96 w-96 rounded-full bg-linear-to-r from-blue-200 to-transparent opacity-30 blur-3xl" aria-hidden="true"></div>
  
  <!-- Gradient blob decorativo fondo derecha -->
  <div class="pointer-events-none absolute -right-24 top-1/3 h-96 w-96 rounded-full bg-linear-to-l from-purple-200 to-transparent opacity-25 blur-3xl" aria-hidden="true"></div>

  <!-- Tarjeta de login -->
  <section class="relative z-10 w-full max-w-md">
    <div class="rounded-3xl border border-white/60 bg-linear-to-br from-white/80 to-white/60 px-8 py-10 shadow-lg shadow-blue-300/10 backdrop-blur-xl">
      
      <!-- Ícono de escudo -->
      <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-linear-to-br from-blue-400 to-cyan-400 shadow-lg shadow-blue-400/30">
        <svg class="h-8 w-8 text-white" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v7c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.5V12c0 4.75-2.61 8.8-7 10.7-4.39-1.9-7-5.95-7-10.7V6.68l7-3.5z"/>
        </svg>
      </div>


      <!-- Título y subtítulo -->
      <header class="mb-8 text-center">
        <h1 class="m-0 text-3xl font-bold tracking-tight text-gray-800">Bienvenido</h1>
        <p class="mt-2 text-base text-gray-600">Sistema de Vigilancia Docente</p>
      </header>

      <!-- Formulario -->
      <form class="grid gap-5 space-y-5">
        
        <!-- Campo Correo Electrónico -->
        <div class="grid gap-2">
          <label for="email" class="text-sm font-semibold text-gray-700">Correo Electrónico</label>
          <div class="group relative flex items-center rounded-2xl border-2 border-gray-200 bg-white/60 transition duration-300 focus-within:border-blue-400 focus-within:shadow-[0_0_0_3px_rgba(59,130,246,0.1)]">
            <input 
              id="email" 
              name="email" 
              type="email" 
              placeholder="correo@colegio.edu" 
              autocomplete="email"
              class="w-full border-0 bg-transparent px-4 py-3 text-gray-800 placeholder:text-gray-400 outline-none"
            />
          </div>
        </div>

        <!-- Campo Contraseña -->
        <div class="grid gap-2">
          <label for="password" class="text-sm font-semibold text-gray-700">Contraseña</label>
          <div class="group relative flex items-center rounded-2xl border-2 border-gray-200 bg-white/60 transition duration-300 focus-within:border-blue-400 focus-within:shadow-[0_0_0_3px_rgba(59,130,246,0.1)]">
            <input 
              id="password" 
              name="password" 
              type="password" 
              placeholder="••••••••" 
              autocomplete="current-password"
              class="w-full border-0 bg-transparent px-4 py-3 text-gray-800 placeholder:text-gray-500 outline-none"
            />
            <button 
              type="button" 
              class="mr-3 grid h-9 w-9 place-items-center rounded-lg bg-transparent text-gray-500 transition hover:bg-gray-100"
              aria-label="Toggle password visibility"
            >
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Checkbox Recordar contraseña -->
        <label class="inline-flex w-fit select-none items-center gap-2.5 text-sm font-semibold text-gray-700 cursor-pointer">
          <input 
            type="checkbox" 
            name="remember" 
            class="h-5 w-5 cursor-pointer appearance-none rounded-md border-2 border-gray-300 bg-white checked:border-blue-500 checked:bg-linear-to-br checked:from-blue-400 checked:to-blue-600 transition"
          />
          <span>Recordar contraseña</span>
        </label>

        <!-- Botón Iniciar Sesión -->
        <button 
          type="submit" 
          class="mt-6 w-full rounded-full border-0 bg-linear-to-r from-blue-500 to-cyan-500 px-6 py-3.5 text-lg font-bold tracking-wide text-white shadow-lg transition duration-300 hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0"
        >
          Iniciar Sesión
        </button>
      </form>

    </div>
  </section>

</main>
